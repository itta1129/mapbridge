<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MapBridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');

:root {
  --bg: #0f0f14;
  --card: #1a1a22;
  --border: #2c2c3a;
  --accent: #4f8aff;
  --accent2: #6c63ff;
  --text: #eeeef5;
  --muted: #72728a;
  --success: #34d399;
  --error: #f87171;
  --warn: #fbbf24;
  --pin: #ff5f5f;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 80px;
  gap: 16px;
  max-width: 480px;
  margin: 0 auto;
}

/* ─ Header ─ */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
}
.pin-svg {
  width: 30px; height: 36px; flex-shrink: 0;
}
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.75rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}
.tagline {
  font-size: 0.82rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 4px;
}

/* ─ Tabs ─ */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
}
.tab {
  padding: 12px 8px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
}
.tab.active {
  border-color: var(--accent);
  color: #fff;
  background: rgba(79,138,255,0.12);
}

/* ─ Card ─ */
.card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ─ Panels ─ */
.panel { display: none; flex-direction: column; gap: 14px; }
.panel.active { display: flex; }

/* ─ Steps ─ */
.steps { display: flex; flex-direction: column; gap: 8px; }
.step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.83rem;
  color: var(--muted);
  line-height: 1.5;
}
.step-n {
  min-width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(79,138,255,0.15);
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ─ Drop zone ─ */
.drop-zone {
  width: 100%;
  min-height: 150px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.02);
  padding: 20px;
}
.drop-zone:active, .drop-zone.over {
  border-color: var(--accent);
  background: rgba(79,138,255,0.06);
}
.drop-icon { font-size: 2.2rem; line-height: 1; }
.drop-label {
  font-size: 0.85rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}
.drop-label strong { color: var(--text); }
#fileInput { display: none; }

/* ─ Preview ─ */
.preview-wrap { position: relative; }
#previewImg {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  border-radius: 10px;
  display: none;
}
.remove-btn {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.65);
  border: none; color: #fff;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 1rem;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* ─ URL input ─ */
.url-input-wrap { position: relative; }
textarea {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  line-height: 1.6;
  padding: 12px 40px 12px 14px;
  resize: none;
  height: 90px;
  outline: none;
  transition: border-color 0.2s;
}
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: var(--accent); }
.clear-x {
  position: absolute;
  top: 10px; right: 10px;
  background: none; border: none;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  padding: 4px;
}

/* ─ Hint ─ */
.hint {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.5;
}

/* ─ CTA Button ─ */
.cta {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.2px;
  -webkit-appearance: none;
}
.cta:active { opacity: 0.82; transform: scale(0.98); }
.cta:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ─ Result card ─ */
.result-wrap { width: 100%; }

.result-card {
  width: 100%;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: popIn 0.22s ease;
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-card.ok  { border-color: rgba(52,211,153,0.25); }
.result-card.err { border-color: rgba(248,113,113,0.25); }

.result-top {
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.ok  { background: var(--success); }
.dot.err { background: var(--error); }

.result-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  color: #fff;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.result-addr {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
}

.result-coords {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.8;
  font-variant-numeric: tabular-nums;
}
.result-coords b { color: var(--text); font-weight: 500; }

.conf {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
  margin-top: 2px;
}
.conf-high   { background: rgba(52,211,153,0.15); color: var(--success); }
.conf-medium { background: rgba(251,191,36,0.15);  color: var(--warn); }
.conf-low    { background: rgba(248,113,113,0.15); color: var(--error); }

.gmap-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 13px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  text-decoration: none;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  transition: opacity 0.15s;
}
.gmap-btn:active { opacity: 0.82; }

.err-msg {
  font-size: 0.83rem;
  color: var(--error);
  line-height: 1.7;
}
.retry-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 0.85rem;
  padding: 10px;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
}
.retry-btn:active { border-color: var(--accent); color: var(--text); }

/* ─ Spinner ─ */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-note {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  min-height: 16px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="logo">
  <svg class="pin-svg" viewBox="0 0 30 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 0C6.716 0 0 6.716 0 15c0 9.941 13.5 21 15 21S30 24.941 30 15C30 6.716 23.284 0 15 0z" fill="#ff5f5f"/>
    <circle cx="15" cy="15" r="6.5" fill="#0f0f14"/>
    <circle cx="15" cy="15" r="2.5" fill="#4f8aff"/>
  </svg>
  <h1>MapBridge</h1>
</div>
<p class="tagline">Airbnb・Booking・Agodaの物件を<br>そのままGoogle Mapsで開く</p>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-ss" onclick="switchTab('ss')">📸 地図スクショ</div>
  <div class="tab" id="tab-url" onclick="switchTab('url')">🔗 URL入力</div>
</div>

<!-- Card -->
<div class="card">

  <!-- Screenshot panel -->
  <div class="panel active" id="panel-ss">
    <div class="steps">
      <div class="step">
        <div class="step-n">1</div>
        <span>Airbnbアプリで物件の<strong style="color:var(--text)">地図画面</strong>を開く</span>
      </div>
      <div class="step">
        <div class="step-n">2</div>
        <span>スクリーンショットを撮る</span>
      </div>
      <div class="step">
        <div class="step-n">3</div>
        <span>下のボタンでそのスクショを選択する</span>
      </div>
    </div>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">🗺️</div>
      <div class="drop-label"><strong>スクショを選択</strong><br>タップして写真を選ぶ</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-wrap">
      <img id="previewImg" alt="preview">
      <button class="remove-btn" id="removeBtn" onclick="removeImg()">✕</button>
    </div>

    <p class="hint">📍 物件のピンや地名が写っているほど精度が上がります</p>

    <button class="cta" id="ssBtn" onclick="analyzeScreenshot()" disabled>
      <span id="ssBtnIcon">📍</span>
      <span id="ssBtnText">スクショを解析してGoogle Mapsで開く</span>
    </button>
    <div class="status-note" id="ssNote"></div>
  </div>

  <!-- URL panel -->
  <div class="panel" id="panel-url">
    <div class="url-input-wrap">
      <textarea id="urlInput"
        placeholder="https://www.airbnb.jp/rooms/...&#10;https://www.booking.com/hotel/...&#10;施設名・住所でもOK"></textarea>
      <button class="clear-x" onclick="clearURL()">✕</button>
    </div>
    <p class="hint">URLをそのまま貼り付け → AIがWeb検索して座標を特定 → Google Mapsが開きます</p>
    <button class="cta" id="urlBtn" onclick="analyzeURL()">
      <span id="urlBtnIcon">🔍</span>
      <span id="urlBtnText">検索してGoogle Mapsで開く</span>
    </button>
    <div class="status-note" id="urlNote"></div>
  </div>

</div>

<!-- Result -->
<div class="result-wrap" id="resultWrap"></div>

<script>
// ══════════════════════════════════════
//  Tab switch
// ══════════════════════════════════════
function switchTab(t) {
  ['ss','url'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('active', n===t);
    document.getElementById('panel-'+n).classList.toggle('active', n===t);
  });
  document.getElementById('resultWrap').innerHTML = '';
}

// ══════════════════════════════════════
//  Image handling
// ══════════════════════════════════════
let imgBase64 = null;

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// Clipboard paste support
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      loadFile(item.getAsFile());
      switchTab('ss');
      break;
    }
  }
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    imgBase64 = dataUrl.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = dataUrl;
    img.style.display = 'block';
    document.getElementById('removeBtn').style.display = 'flex';
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('ssBtn').disabled = false;
    document.getElementById('resultWrap').innerHTML = '';
    document.getElementById('ssNote').textContent = '';
  };
  reader.readAsDataURL(file);
}

function removeImg() {
  imgBase64 = null;
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('removeBtn').style.display = 'none';
  document.getElementById('dropZone').style.display = 'flex';
  document.getElementById('ssBtn').disabled = true;
  document.getElementById('fileInput').value = '';
  document.getElementById('resultWrap').innerHTML = '';
}

// ══════════════════════════════════════
//  Screenshot analysis
// ══════════════════════════════════════
async function analyzeScreenshot() {
  if (!imgBase64) return;
  setSS(true, 'AIが地図を解析中…');
  document.getElementById('resultWrap').innerHTML = '';
  try {
    const result = await callClaudeImage(imgBase64);
    renderResult(result);
  } catch(e) {
    renderError(e.message);
  } finally {
    setSS(false, '');
  }
}

async function callClaudeImage(b64) {
  // Detect image type from base64 header
  const mime = imgBase64MimeType(b64);

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 600,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: mime, data: b64 }
          },
          {
            type: 'text',
            text: `この画像はAirbnb・Booking.com・Agodaなどの宿泊アプリの地図スクリーンショットです。

地図に表示されている物件ピン・マーカー・ハイライトされた場所の緯度・経度を特定してください。

以下を手がかりに精密に推定してください：
- 地図上の道路・川・海岸線の形状
- 表示されている地名・駅名・ランドマーク名
- 物件ピンの位置
- 地図のズームレベル

必ず以下のJSON形式のみで回答（前後の説明・マークダウン不要）:
{"lat":数値,"lng":数値,"name":"施設名または地域名","address":"推定住所","confidence":"high/medium/low","note":"判断の根拠"}

座標の特定が不可能な場合のみ:
{"error":"理由"}`
          }
        ]
      }]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error?.message || `APIエラー (${res.status})`);
  }

  const data = await res.json();
  const raw = data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('解析に失敗しました。もう一度お試しください。');
  const parsed = JSON.parse(m[0]);
  if (parsed.error) throw new Error(parsed.error);
  if (!validCoord(parsed.lat, parsed.lng)) throw new Error('座標を特定できませんでした。地図部分が写ったスクショをお試しください。');
  parsed.method = 'screenshot';
  return parsed;
}

function imgBase64MimeType(b64) {
  // Check first few bytes
  const head = atob(b64.slice(0, 16));
  if (head.startsWith('\x89PNG')) return 'image/png';
  if (head.startsWith('GIF')) return 'image/gif';
  if (head.startsWith('RIFF')) return 'image/webp';
  return 'image/jpeg'; // default
}

// ══════════════════════════════════════
//  URL analysis
// ══════════════════════════════════════
async function analyzeURL() {
  const raw = document.getElementById('urlInput').value.trim();
  if (!raw) { document.getElementById('urlInput').focus(); return; }

  // Fast pattern match first
  const quick = urlPatternMatch(raw);
  if (quick) { renderResult({...quick, input: raw}); return; }

  setURL(true, 'Web検索で場所を特定中…');
  document.getElementById('resultWrap').innerHTML = '';

  try {
    const result = await callClaudeSearch(raw);
    result.input = raw;
    renderResult(result);
  } catch(e) {
    renderError(e.message);
  } finally {
    setURL(false, '');
  }
}

function urlPatternMatch(url) {
  const patterns = [
    [/[?&]latitude=([-\d.]+).*?longitude=([-\d.]+)/i, false],
    [/[?&]longitude=([-\d.]+).*?latitude=([-\d.]+)/i, true],
    [/[?&]lat=([-\d.]+).*?[?&]lng=([-\d.]+)/i, false],
    [/[?&]lng=([-\d.]+).*?[?&]lat=([-\d.]+)/i, true],
    [/@([-\d.]+),([-\d.]+)/, false],
    [/ll=([-\d.]+),([-\d.]+)/i, false],
    [/map_center=([-\d.]+),([-\d.]+)/i, false],
  ];
  for (const [p, swap] of patterns) {
    const m = url.match(p);
    if (m) {
      const a = parseFloat(m[1]), b = parseFloat(m[2]);
      const lat = swap ? b : a, lng = swap ? a : b;
      if (validCoord(lat, lng)) return { lat, lng, method:'url-pattern', confidence:'high' };
    }
  }
  return null;
}

async function callClaudeSearch(input) {
  const isURL = /^https?:\/\//.test(input);
  const prompt = isURL
    ? `宿泊予約サービス（Airbnb/Booking.com/Agoda等）の物件URLです。
web_searchツールでこの施設の住所・緯度経度を検索して特定してください。

URL: ${input}

検索のヒント:
- URLからルームIDや物件名を抽出して検索
- "airbnb [ID] location address" などで検索
- 施設名が判明したら "施設名 住所 緯度経度" で再検索

最終回答はJSONのみ（説明・マークダウン不要）:
{"lat":数値,"lng":数値,"name":"施設名","address":"住所","confidence":"high/medium/low","method":"ai-url","note":"根拠"}`
    : `以下の施設名・住所をweb_searchで検索し、緯度経度を特定してください。
入力: ${input}
最終回答はJSONのみ:
{"lat":数値,"lng":数値,"name":"施設名","address":"住所","confidence":"high/medium/low","method":"ai-name","note":"根拠"}`;

  const messages = [{ role:'user', content: prompt }];
  const tools = [{ type:'web_search_20250305', name:'web_search' }];
  let finalText = '';

  for (let turn = 0; turn < 6; turn++) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, tools, messages })
    });
    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e.error?.message || `APIエラー (${res.status})`);
    }
    const data = await res.json();
    const texts = data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    if (texts) finalText = texts;
    if (data.stop_reason === 'end_turn') break;
    const toolUses = data.content.filter(c=>c.type==='tool_use');
    if (!toolUses.length) break;
    messages.push({ role:'assistant', content: data.content });
    messages.push({ role:'user', content: toolUses.map(tu=>({ type:'tool_result', tool_use_id:tu.id, content:'' })) });
  }

  const clean = finalText.replace(/```json|```/g,'').trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('解析に失敗しました。施設名や住所で入力し直すと成功しやすいです。');
  const parsed = JSON.parse(m[0]);
  if (parsed.error) throw new Error(parsed.error);
  if (!validCoord(parsed.lat, parsed.lng)) throw new Error('有効な座標が取得できませんでした。');
  return parsed;
}

// ══════════════════════════════════════
//  Render
// ══════════════════════════════════════
function renderResult(data) {
  const gmapURL = `https://www.google.com/maps?q=${data.lat},${data.lng}&z=17`;
  const confClass = { high:'conf-high', medium:'conf-medium', low:'conf-low' }[data.confidence] || 'conf-medium';
  const confLabel = { high:'高精度', medium:'中精度', low:'低精度（要確認）' }[data.confidence] || '';
  const methodLabel = {
    'url-pattern': 'URLから直接取得',
    'screenshot':  'スクショAI解析',
    'ai-url':      'AI+Web検索',
    'ai-name':     'AI+Web検索',
  }[data.method] || '';

  document.getElementById('resultWrap').innerHTML = `
    <div class="result-card ok">
      <div class="result-top">
        <div class="dot ok"></div>
        <div class="result-name">${x(data.name||'場所を特定しました')}</div>
      </div>
      ${data.address ? `<div class="result-addr">📍 ${x(data.address)}</div>` : ''}
      <div class="result-coords">
        緯度 <b>${data.lat.toFixed(6)}</b>　経度 <b>${data.lng.toFixed(6)}</b><br>
        <span class="conf ${confClass}">${confLabel}</span>
        <span style="font-size:0.68rem;color:var(--muted);margin-left:6px;">${methodLabel}</span>
        ${data.note ? `<br><span style="font-size:0.72rem;color:var(--muted);margin-top:2px;display:block;">${x(data.note)}</span>` : ''}
      </div>
      <a class="gmap-btn" href="${gmapURL}" target="_blank" rel="noopener">
        🗺 Google Mapsで開く
      </a>
    </div>`;

  // Auto-open on mobile (needs user gesture, so slight delay)
  setTimeout(() => {
    try { window.open(gmapURL, '_blank'); } catch(e) {}
  }, 400);
}

function renderError(msg) {
  document.getElementById('resultWrap').innerHTML = `
    <div class="result-card err">
      <div class="result-top">
        <div class="dot err"></div>
        <div class="result-name">場所を特定できませんでした</div>
      </div>
      <div class="err-msg">${x(msg)}</div>
      <button class="retry-btn" onclick="document.getElementById('resultWrap').innerHTML=''">
        ↩ 閉じる
      </button>
    </div>`;
}

// ══════════════════════════════════════
//  Loading states
// ══════════════════════════════════════
function setSS(on, note) {
  document.getElementById('ssBtnIcon').innerHTML = on ? '<span class="spinner"></span>' : '📍';
  document.getElementById('ssBtnText').textContent = on ? '解析中…' : 'スクショを解析してGoogle Mapsで開く';
  document.getElementById('ssBtn').disabled = on;
  document.getElementById('ssNote').textContent = on ? note : '';
}
function setURL(on, note) {
  document.getElementById('urlBtnIcon').innerHTML = on ? '<span class="spinner"></span>' : '🔍';
  document.getElementById('urlBtnText').textContent = on ? '検索中…' : '検索してGoogle Mapsで開く';
  document.getElementById('urlBtn').disabled = on;
  document.getElementById('urlNote').textContent = on ? note : '';
}

// ══════════════════════════════════════
//  Utils
// ══════════════════════════════════════
function validCoord(lat, lng) {
  return typeof lat==='number' && typeof lng==='number' &&
    !isNaN(lat) && !isNaN(lng) &&
    lat>=-90 && lat<=90 && lng>=-180 && lng<=180 &&
    !(lat===0 && lng===0);
}
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function clearURL() {
  document.getElementById('urlInput').value = '';
  document.getElementById('resultWrap').innerHTML = '';
}
</script>
</body>
</html>
